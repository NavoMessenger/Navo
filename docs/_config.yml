title: Navo
description: Independent Telegram client for Android, Windows & macOS. Flutter + TDLib. iOS coming soon.

# Project site on GitHub Pages (current):
#   https://navomessenger.github.io/Navo/
# When navo.im DNS + CNAME are live, switch to:
#   url: "https://navo.im"
#   baseurl: ""
# and restore docs/CNAME (content: navo.im). See DNS.md.
url: "https://navomessenger.github.io"
baseurl: "/Navo"

remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

color_scheme: light
search_enabled: true
heading_anchors: true

aux_links:
  "Download":
    - "/Navo/download.html"
  "GitHub":
    - "https://github.com/NavoMessenger/Navo"
  "Releases":
    - "https://github.com/NavoMessenger/Navo/releases/latest"
  "中文":
    - "/Navo/zh-CN/"

aux_links_new_tab: false

footer_content: >-
  Navo is an independent, unofficial Telegram client — not affiliated with Telegram.
  <a href="/Navo/privacy.html">Privacy</a> ·
  <a href="/Navo/terms.html">Terms</a> ·
  <a href="https://github.com/NavoMessenger/Navo">GitHub</a>

sass:
  quiet_deps: true

callouts_level: quiet
callouts:
  warning:
    title: Note
    color: yellow
