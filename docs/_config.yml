title: Navo
description: Independent Telegram client for Android, Windows & macOS. Flutter + TDLib. iOS coming soon.

# Custom domain (GitHub Pages). Project path /Navo is not used when CNAME is active.
# Fallback preview: https://navomessenger.github.io/Navo/ (may redirect to custom domain).
url: "https://www.navo.im"
baseurl: ""

remote_theme: just-the-docs/just-the-docs@v0.10.1

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

color_scheme: light
search_enabled: true
heading_anchors: true

aux_links:
  "Download":
    - "/download.html"
  "GitHub":
    - "https://github.com/NavoMessenger/Navo"
  "Releases":
    - "https://github.com/NavoMessenger/Navo/releases/latest"
  "中文":
    - "/zh-CN/"

aux_links_new_tab: false

footer_content: >-
  Independent unofficial Telegram client — not affiliated with Telegram.
  <a href="/privacy.html">Privacy</a> ·
  <a href="/terms.html">Terms</a> ·
  <a href="https://github.com/NavoMessenger/Navo">GitHub</a>

sass:
  quiet_deps: true

callouts_level: quiet
callouts:
  warning:
    title: Note
    color: yellow
